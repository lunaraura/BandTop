<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Market Simulation – Optimal Buy/Sell Ladder</title>
<style>
  body{font-family:Arial,Helvetica,sans-serif;background:#111;color:#eee;margin:0;padding:20px}
  h1{margin-top:0;text-align:center}
  #controls{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;max-width:820px;margin:0 auto 20px}
  label{display:flex;flex-direction:column;font-size:0.85rem}
  input{padding:4px;border:1px solid #555;border-radius:4px;background:#222;color:#eee}
  button{padding:8px 14px;font-size:1rem;cursor:pointer;border:none;border-radius:4px;background:#3a8bff;color:#fff}
  button:disabled{opacity:.4;cursor:not-allowed}
  table{width:100%;border-collapse:collapse;margin-top:20px}
  th,td{border:1px solid #333;padding:6px;text-align:center;font-size:0.9rem}
  th{background:#222}
  tr:nth-child(even){background:#1c1c1c}
  .statBox{margin-top:15px;font-size:1rem}
</style>
</head>
<body>

<h1>📊 Market Simulation & Optimal Ladder Finder</h1>

<div id="controls">
  <label>Min
    <input type="number" id="minVal" value="0">
  </label>
  <label>Median
    <input type="number" id="medVal" value="50">
  </label>
  <label>Max
    <input type="number" id="maxVal" value="100">
  </label>
  <label>Ladder Steps
    <input type="number" id="ladderSteps" value="3" min="1">
  </label>
  <label>Step Gap
    <input type="number" id="stepGap" value="2" min="0.1" step="0.1">
  </label>
  <label>Max Start Gap
    <input type="number" id="maxStart" value="20" min="0" step="0.1">
  </label>
  <label>Start-Gap Increment
    <input type="number" id="scanInc" value="0.5" min="0.1" step="0.1">
  </label>
  <label>Ticks / Simulation
    <input type="number" id="ticks" value="1000" min="10">
  </label>
  <label>Simulations
    <input type="number" id="runs" value="50" min="1">
  </label>
  <button id="runBtn">Run Sims</button>
  <button id="csvBtn" disabled>Download CSV</button>
</div>

<div class="statBox" id="summary"></div>
<table id="resultTbl">
  <thead>
    <tr>
      <th>#</th>
      <th>Best Start Gap</th>
      <th>Best Profit</th>
      <th>Worst Profit</th>
      <th>Avg Profit</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script>
/* ===== 3-Vector Noise Engine (same as before) ========================== */
const big = { w:0.6, maxAcc:0.05 };
const mid = { w:0.3, maxAcc:0.10 };
const small = { w:0.1, maxAcc:0.30 };
const vecTemplate = [big, mid, small];

function rng(min,max){ return Math.random()*(max-min)+min; }
function clamp(x,a,b){ return Math.min(Math.max(x,a),b); }

function makeSeries(ticks,min,med,max){
  const v = vecTemplate.map(o=>({pos:0,vel:0,...o}));
  const out=[];
  for(let t=0;t<ticks;t++){
    v.forEach(o=>{
      const acc=rng(-o.maxAcc,o.maxAcc);
      o.vel=clamp(o.vel+acc,-o.maxAcc*10,o.maxAcc*10);
      o.pos*=0.98; // drift damping
      o.pos+=o.vel;
    });
    const delta=v.reduce((s,o)=>s+o.pos*o.w,0);
    out.push(clamp(med+delta,min,max));
  }
  return out;
}

/* ===== Ladder Simulation ============================================== */
function simulateLadder(series,med,steps,gap,startOffset,min,max){
  // Build ladder levels
  const buys = [], sells=[];
  for(let i=0;i<steps;i++){
    const off = startOffset + i*gap;
    buys .push( clamp(med - off, min, max) );
    sells.push( clamp(med + off, min, max) );
  }
  let inventory=[]; // each = {buyPrice, target}
  let profit=0;

  for(const price of series){
    /* handle sells first: */
    for(let i=inventory.length-1;i>=0;i--){
      if(price>=inventory[i].target){
        profit += inventory[i].target - inventory[i].buyPrice;
        inventory.splice(i,1);
      }
    }
    /* then buys in order (from closest to farthest) */
    for(let i=0;i<steps;i++){
      if(price<=buys[i] && !inventory.find(o=>o.buyPrice===buys[i])){ // buy if not already bought
        inventory.push({buyPrice:buys[i], target:sells[i]});
      }
    }
  }
  /* Liquidate leftovers at last price */
  const last=series[series.length-1];
  for(const pos of inventory) profit += last - pos.buyPrice;
  return profit;
}

function findBestLadder(series,params){
  const {med,steps,gap,maxStart,scanInc,min,max}=params;
  let bestP=-Infinity, worstP=Infinity, bestStart=0, total=0, tested=0;
  for(let s=0;s<=maxStart+1e-9;s+=scanInc){
    const p=simulateLadder(series,med,steps,gap,s,min,max);
    if(p>bestP){bestP=p;bestStart=s.toFixed(2);}
    if(p<worstP) worstP=p;
    total+=p; tested++;
  }
  return {bestStart:+bestStart, bestProfit:bestP, worstProfit:worstP, avgProfit:total/tested};
}

/* ===== UI Handling ===================================================== */
const $=id=>document.getElementById(id);
const tbody=$('resultTbl').querySelector('tbody');

$('runBtn').onclick=()=>{
  const cfg={
    min:+$('minVal').value,
    med:+$('medVal').value,
    max:+$('maxVal').value,
    steps:+$('ladderSteps').value,
    gap:+$('stepGap').value,
    maxStart:+$('maxStart').value,
    scanInc:+$('scanInc').value,
    ticks:+$('ticks').value,
    runs:+$('runs').value
  };
  tbody.innerHTML='';
  let grandTotal=0, grandBest=0, grandWorst=Infinity;
  const csvLines=['Run,BestStartGap,BestProfit,WorstProfit,AverageProfit'];
  for(let r=1;r<=cfg.runs;r++){
    const series=makeSeries(cfg.ticks,cfg.min,cfg.med,cfg.max);
    const res=findBestLadder(series,{med:cfg.med,steps:cfg.steps,gap:cfg.gap,
                                     maxStart:cfg.maxStart,scanInc:cfg.scanInc,
                                     min:cfg.min,max:cfg.max});
    grandTotal+=res.avgProfit;
    grandBest = Math.max(grandBest,res.bestProfit);
    grandWorst=Math.min(grandWorst,res.worstProfit);
    csvLines.push([r,res.bestStart,res.bestProfit.toFixed(2),
                      res.worstProfit.toFixed(2),
                      res.avgProfit.toFixed(2)].join(','));
    const row=document.createElement('tr');
    row.innerHTML=`<td>${r}</td><td>${res.bestStart}</td><td>${res.bestProfit.toFixed(2)}</td><td>${res.worstProfit.toFixed(2)}</td><td>${res.avgProfit.toFixed(2)}</td>`;
    tbody.appendChild(row);
  }
  $('summary').innerHTML=
      `✅ <strong>${cfg.runs}</strong> simulations complete  |  `+
      `Overall Avg Profit: <strong>${(grandTotal/cfg.runs).toFixed(2)}</strong>   `+
      `Max Profit: <strong>${grandBest.toFixed(2)}</strong>   `+
      `Min Profit: <strong>${grandWorst.toFixed(2)}</strong>`;
  $('csvBtn').disabled=false;
  $('csvBtn').onclick=()=>{
     const blob=new Blob([csvLines.join('\n')],{type:'text/csv'});
     const url=URL.createObjectURL(blob);
     const a=document.createElement('a');
     a.href=url;a.download='simulation_results.csv';a.click();
     setTimeout(()=>URL.revokeObjectURL(url),2000);
  };
};
</script>
</body>
</html>
