<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ND Raycaster — 1D / 2D / 3D / 4D</title>
<style>
  :root {
    --bg: #0a0e14;
    --panel: #121821;
    --line: #232b38;
    --text: #d6dde6;
    --muted: #6b7785;
    --accent: #5fd4c8;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    display: flex;
    height: 100vh;
  }
  #sidebar {
    width: 300px;
    flex-shrink: 0;
    background: var(--panel);
    border-right: 1px solid var(--line);
    padding: 20px;
    overflow-y: auto;
  }
  #main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  h1 {
    font-size: 13px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--accent);
    margin: 0 0 4px;
  }
  .sub {
    font-size: 11px;
    color: var(--muted);
    margin: 0 0 20px;
  }
  .group {
    margin-bottom: 18px;
    padding-bottom: 18px;
    border-bottom: 1px solid var(--line);
  }
  .group:last-child { border-bottom: none; }
  label {
    display: block;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .row { display: flex; gap: 6px; margin-bottom: 10px; }
  button.cfg {
    flex: 1;
    background: #1a212c;
    border: 1px solid var(--line);
    color: var(--text);
    padding: 8px 0;
    font-family: inherit;
    font-size: 12px;
    cursor: pointer;
    border-radius: 3px;
  }
  button.cfg.active {
    background: var(--accent);
    color: #06120f;
    border-color: var(--accent);
  }
  button.cfg:hover:not(.active) { border-color: var(--accent); }
  input[type=range] { width: 100%; accent-color: var(--accent); }
  .val { float: right; color: var(--accent); }
  canvas {
    background: var(--bg);
    border: 1px solid var(--line);
    image-rendering: pixelated;
  }
  #stats {
    font-size: 11px;
    color: var(--muted);
    line-height: 1.6;
    white-space: pre;
  }
  select {
    width: 100%;
    background: #1a212c;
    border: 1px solid var(--line);
    color: var(--text);
    padding: 6px;
    font-family: inherit;
    font-size: 12px;
    border-radius: 3px;
  }
</style>
</head>
<body>

<div id="sidebar">
  <h1>ND Raycaster</h1>
  <p class="sub">Analytic ray vs edge/face intersection<br>Full 4D rotation + perspective w-divide</p>

  <div class="group">
    <label>Screen Configuration</label>
    <div class="row">
      <button class="cfg" data-cfg="1D">1D</button>
      <button class="cfg" data-cfg="2D">2D</button>
      <button class="cfg active" data-cfg="3D">3D</button>
    </div>
  </div>

  <div class="group">
    <label>Shape</label>
    <select id="shapeSelect">
      <option value="cube">Cube (3D, 8 verts)</option>
      <option value="tesseract" selected>Tesseract (4D, 16 verts)</option>
    </select>
  </div>

  <div class="group">
    <label>XY Rotation <span class="val" id="vXY">0°</span></label>
    <input type="range" id="rotXY" min="0" max="360" value="0">
    <label>XZ Rotation <span class="val" id="vXZ">0°</span></label>
    <input type="range" id="rotXZ" min="0" max="360" value="0">
    <label>XW Rotation <span class="val" id="vXW">0°</span></label>
    <input type="range" id="rotXW" min="0" max="360" value="0">
    <label>YW Rotation <span class="val" id="vYW">0°</span></label>
    <input type="range" id="rotYW" min="0" max="360" value="0">
    <label>ZW Rotation <span class="val" id="vZW">0°</span></label>
    <input type="range" id="rotZW" min="0" max="360" value="0">
  </div>

  <div class="group">
    <label>Camera Distance (z) <span class="val" id="vZ">5</span></label>
    <input type="range" id="camZ" min="1" max="30"step="0.1" value="5">
    <label>Camera W Position<span class ="val" id="vW">0</span></label>
    <input type="range" id="camW" min="-20" max="20" step="0.1" value="0">
  <label>W Tolerance</label>
  <input type="range" id="wTolerance" min="1" max="15" step="0.1" value="1">
  <label>W Distance</label>
  <input type="range" id="wDistance" min="0.1" max="15" step="0.1" value="2">
  <label>Resolution <span class="val" id="vRes">48</span></label>

  <input type="range" id="resSlider" min="8" max="240" step="4" value="48">
  </div>

  <div class="group">
    <label>Auto-rotate</label>
    <div class="row">
      <button class="cfg" id="autoXW">Spin XW</button>
      <button class="cfg" id="autoStop">Stop</button>
    </div>
  </div>

  <div id="stats"></div>
</div>

<div id="main">
  <canvas id="canvas" width="640" height="640"></canvas>
</div>

<script src="main0.js"></script>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const cam = new Camera(canvas);
cam.configuration = "3D";

const cubeMap = {};
for (let i = 0; i < 8; i++) cubeMap[i] = squareMap[i];

let object = new RigidObject(squareMap); // default: tesseract
let shapeName = 'tesseract';

const statsEl = document.getElementById('stats');
let autoSpin = false;

function rebuildObject() {
    object = new RigidObject(shapeName === 'cube' ? cubeMap : squareMap);
    object.rot.xy = deg(document.getElementById('rotXY').value);
    object.rot.xz = deg(document.getElementById('rotXZ').value);
    object.rot.xw = deg(document.getElementById('rotXW').value);
    object.rot.yw = deg(document.getElementById('rotYW').value);
    object.rot.zw = deg(document.getElementById('rotZW').value);
}
function deg(d) { return Number(d) * Math.PI / 180; }

function draw() {
    object.rot.xy = deg(document.getElementById('rotXY').value);
    object.rot.xz = deg(document.getElementById('rotXZ').value);
    object.rot.xw = deg(document.getElementById('rotXW').value);
    object.rot.yw = deg(document.getElementById('rotYW').value);
    object.rot.zw = deg(document.getElementById('rotZW').value);
    

    cam.pos = v(0,0,-Number(document.getElementById('camZ').value), Number(document.getElementById('camW').value))
    cam.wDistance =
        Number(document.getElementById('wDistance').value);

    cam.wTolerance =
        Number(document.getElementById('wTolerance').value);
    const res = Number(document.getElementById('resSlider').value);
    const resX = res;
    const resY = cam.configuration === "3D" ? res : 1;
const layers = cam.raycastOverlay(object, resX, resY);

renderOverlayHits(
    ctx,
    canvas,
    layers,
    cam.configuration,
    resX,
    resY
);
    const t0 = performance.now();
    const hits = cam.raycast(object, resX, resY);
    const t1 = performance.now();
    renderHits(
        ctx,
        canvas,
        hits,
        cam.configuration,
        resX,
        resY,
        cam.pos.w,
        cam.wTolerance
    );
    const hitCount = hits.filter(h => h).length;
    statsEl.textContent =
`config:    ${cam.configuration}
shape:     ${shapeName}
rays:      ${hits.length} (${resX}x${resY})
hits:      ${hitCount}
edges:     ${object.getEdges().length}
faces:     ${object.getFaces().length}
tris:      ${object.getTriangles().length}
cast time: ${(t1 - t0).toFixed(2)}ms`;
}

document.querySelectorAll('button.cfg[data-cfg]').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('button.cfg[data-cfg]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        cam.configuration = btn.dataset.cfg;
        draw();
    });
});

document.getElementById('shapeSelect').addEventListener('change', (e) => {
    shapeName = e.target.value;
    rebuildObject();
    draw();
});

['rotXY','rotXZ','rotXW','rotYW','rotZW','camZ','camW', 'wDistance','resSlider'].forEach(id => {
    document.getElementById(id).addEventListener('input', () => {
        const labelMap = { rotXY:'vXY', rotXZ:'vXZ', rotXW:'vXW', rotYW:'vYW', rotZW:'vZW', camZ:'vZ', camW:'vW', wDistance:'vWD', resSlider:'vRes' };
        const lbl = document.getElementById(labelMap[id]);
        const suffix = id.startsWith('rot') ? '°' : '';
        lbl.textContent = document.getElementById(id).value + suffix;
        draw();
    });
});

document.getElementById('autoXW').addEventListener('click', () => { autoSpin = true; });
document.getElementById('autoStop').addEventListener('click', () => { autoSpin = false; });

function loop() {
    if (autoSpin) {
        const slider = document.getElementById('rotXW');
        let val = (Number(slider.value) + 1) % 360;
        slider.value = val;
        document.getElementById('vXW').textContent = val + '°';
        draw();
    }
    requestAnimationFrame(loop);
}

rebuildObject();
draw();
loop();
</script>
</body>
</html>
